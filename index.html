<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Юбилей 30 лет</title>
  <meta name="description" content="Приглашение на празднование юбилея 30 лет в Zoom.">
  <link rel="stylesheet" href="./styles.css?v=mobile-celebration-1">
  <style>
    .portrait-wrap { animation: riseIn 760ms ease-out both; }
    .content { animation: riseIn 760ms ease-out 110ms both; }
    .time-box { animation: popIn 520ms ease-out both; }
    .time-box:nth-child(2) { animation-delay: 80ms; }
    .time-box:nth-child(3) { animation-delay: 160ms; }
    @keyframes riseIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { from { opacity: 0; transform: translateY(12px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @media (max-width: 820px) {
      .page-shell { width: min(100% - 28px, 620px); padding: 14px 0 28px; }
      .invite { gap: 22px; }
      .portrait-wrap { min-height: 280px; height: min(48vh, 420px); }
      .kicker { margin-bottom: 12px; font-size: clamp(0.82rem, 3.7vw, 0.98rem); line-height: 1.25; letter-spacing: 0.11em; }
      h1 { max-width: 100%; font-size: clamp(2.45rem, 10.8vw, 3.65rem); line-height: 0.98; }
      .lead { margin-top: 20px; font-size: clamp(1rem, 4.2vw, 1.15rem); line-height: 1.5; }
      .timer { gap: 8px; margin-top: 26px; }
      .time-box { min-height: 82px; }
      .time-box strong { font-size: clamp(2rem, 11vw, 3rem); }
      .time-box span { font-size: 0.68rem; letter-spacing: 0.06em; }
      .status { margin-top: 14px; font-size: 0.98rem; }
      .actions { margin-top: 22px; }
    }
    @media (max-width: 380px) {
      h1 { font-size: clamp(2.25rem, 10.2vw, 3rem); }
      .portrait-wrap { min-height: 250px; height: min(44vh, 380px); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 1ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <canvas class="confetti-canvas" id="confettiCanvas" aria-hidden="true"></canvas>

  <main class="page-shell">
    <section class="invite" aria-labelledby="pageTitle">
        <div class="portrait-wrap">
          <img
            id="portraitImage"
            class="portrait"
            src="https://lh3.googleusercontent.com/d/18Neq4uW9Di5rIgLygsNifrFzmYPHfkOq=w1280"
            alt="Портрет именинника"
            fetchpriority="high"
          >
        </div>

      <div class="content">
        <p class="kicker">Сегодня в 19:45 по Москве</p>
        <h1 id="pageTitle">Собираемся отпраздновать мои 30</h1>
        <p class="lead">
          Родные, буду очень рад увидеть вас вечером в Zoom. Наливайте чай, берите что-нибудь вкусное
          и подключайтесь к маленькому семейному празднику.
        </p>

        <div class="timer" aria-label="Обратный отсчет до начала праздника">
          <div class="time-box">
            <strong id="hours">00</strong>
            <span>часов</span>
          </div>
          <div class="time-box">
            <strong id="minutes">00</strong>
            <span>минут</span>
          </div>
          <div class="time-box">
            <strong id="seconds">00</strong>
            <span>секунд</span>
          </div>
        </div>

        <p class="status" id="eventStatus">До встречи осталось совсем немного</p>

        <div class="actions" aria-label="Действия">
          <a class="primary-action" id="zoomLink" href="#" target="_blank" rel="noreferrer">Открыть Zoom</a>
          <button class="secondary-action" id="copyZoomButton" type="button">Скопировать Zoom</button>
        </div>

        <audio id="partyAudio" src="https://incompetech.com/music/royalty-free/mp3-royaltyfree/Life%20of%20Riley.mp3" preload="auto" autoplay loop></audio>

        <p class="note" id="copyFeedback" role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script src="./script.js?v=intro-confetti-1"></script>
</body>
</html>
